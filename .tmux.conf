# === 基础设置 ===
set -g default-terminal "tmux-256color"          # 声明终端支持 256 色
set -ga terminal-overrides ",*256col*:Tc"         # 强制开启真彩色（Catppuccin 主题需要）
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'  # 修复部分终端光标样式闪烁问题
set -g mouse on                                   # 开启鼠标：点击切换 pane、拖拽调整大小、滚轮回翻
set -g base-index 1                               # 窗口编号从 1 开始（默认从 0 开始）
set -g pane-base-index 1                          # pane 编号从 1 开始
set -g renumber-windows on                        # 关闭窗口后自动重排编号，不留空号
set -g escape-time 0                              # 快捷键响应延迟设为 0（默认 500ms）
set -g history-limit 50000                        # 回滚行数 50000（默认 2000）

# === 增加前缀键 Ctrl-a（保留默认 Ctrl-b，两个都能用） ===
set -g prefix C-a                                 # 将前缀键改为 Ctrl-a
set -g prefix2 C-b                                # 设置第二前缀键 Ctrl-b，保留原有习惯
bind C-a send-prefix                              # 按两次 Ctrl-a 发送原 Ctrl-a 到终端内

# === 分屏快捷键（保留原有 Ctrl-b % 和 Ctrl-b "） ===
bind | split-window -h -c "#{pane_current_path}"  # Ctrl-a | 竖直分屏，新 pane 在同目录
bind - split-window -v -c "#{pane_current_path}"  # Ctrl-a - 横向分屏，新 pane 在同目录

# === Pane 切换 (vim 风格 h/j/k/l) ===
bind h select-pane -L                             # Ctrl-a h 切到左边 pane
bind j select-pane -D                             # Ctrl-a j 切到下边 pane
bind k select-pane -U                             # Ctrl-a k 切到上边 pane
bind l select-pane -R                             # Ctrl-a l 切到右边 pane

# === 复制模式 (vi 键位) ===
set -g mode-keys vi                               # 复制模式使用 vi 键位
bind -T copy-mode-vi v send-keys -X begin-selection      # v 进入选择模式
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel  # y 复制选中内容并退出

# === 快速重载配置 ===
bind r source-file ~/.tmux.conf \; display "Config reloaded!"  # Ctrl-a r 重载配置

# === 状态栏 ===
set -g status-interval 5                          # 状态栏每 5 秒刷新一次
set -g status-left ' #S | #W | #P '               # 左侧显示 session名 | window名 | pane编号
set -g status-right ' %H:%M  %Y-%m-%d '          # 右侧显示时间 + 日期

# === 插件列表（由 tpm 管理） ===
set -g @plugin 'tmux-plugins/tpm'                 # 插件管理器自身
set -g @plugin 'tmux-plugins/tmux-sensible'       # 合理默认值
set -g @plugin 'tmux-plugins/tmux-resurrect'      # 手动保存/恢复会话
set -g @plugin 'tmux-plugins/tmux-continuum'      # 自动保存/恢复会话

# === Catppuccin Mocha 主题 ===
set -g @plugin 'catppuccin/tmux'                  # Catppuccin 主题
set -g @catppuccin_flavour 'mocha'                # 风味：mocha（暗色，另有 latte/frappe/macchiato）
set -g @catppuccin_window_status_style 'basic'    # 窗口状态样式：basic（简洁）

# === resurrect / continuum ===
set -g @resurrect-capture-pane-contents 'on'      # resurrect 保存时同时捕获 pane 内容
set -g @continuum-restore 'on'                    # continuum 启动 tmux 时自动恢复上次会话

# === 初始化 tpm（必须放在最后） ===
run '~/.tmux/plugins/tpm/tpm'
